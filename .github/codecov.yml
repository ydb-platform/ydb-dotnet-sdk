coverage:
  status:
    project:
      default:
        target: auto       # do not drop below the current level...
        threshold: 1%      # ...by more than 1%
    patch:
      default:
        target: 80%        # new/changed code in the PR diff must be >= 80% covered

# Cross-repo uniform metric: every YDB SDK repo defines this same component_id,
# so native-SDK coverage is queryable identically via the Codecov API
# (?component_id=native-sdk), regardless of how each repo tags its uploads.
#
# This repo is a monorepo. The native-sdk component covers the SDK itself plus its
# first-party OpenTelemetry integration (including Ydb.Sdk hits from EF FunctionalTests).
# The EF Core provider is a separate framework adapter and gets its own component,
# so it does not dilute the SDK number.
component_management:
  individual_components:
    - component_id: native-sdk
      name: Native SDK
      paths:
        - "src/Ydb.Sdk/src/**"
        - "src/Ydb.Sdk.OpenTelemetry/src/**"
    - component_id: efcore
      name: EF Core provider
      paths:
        - "src/EFCore.Ydb/src/**"

# ydb-sdk and efcore-ydb coverage come from separate jobs, each uploaded from a
# single matrix leg. Carry the last known value forward so a flaky or fail-fast
# cancelled leg that skips its upload does not collapse the total and false-fail
# the project status above.
#
# Path filters keep each flag scoped to its component even when a report contains
# both assemblies (EF FunctionalTests exercise local Ydb.Sdk via ProjectReference
# and are uploaded under both flags).
flags:
  ydb-sdk:
    carryforward: true
    paths:
      - src/Ydb.Sdk/src/**
      - src/Ydb.Sdk.OpenTelemetry/src/**
  efcore-ydb:
    carryforward: true
    paths:
      - src/EFCore.Ydb/src/**
