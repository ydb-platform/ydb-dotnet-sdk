name: publish Ydb.Sdk.OpenTelemetry
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version (e.g. 1.0.0)
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.version }}
      CHANGELOG_FILE: ./src/Ydb.Sdk.OpenTelemetry/CHANGELOG.md
      NUGET_TOKEN: ${{ secrets.YDB_PLATFORM_NUGET_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: |
          cd src/Ydb.Sdk.OpenTelemetry/src
          dotnet build --configuration Release
      - name: Publish
        run: bash .github/scripts/publish-otel.sh
